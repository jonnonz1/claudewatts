<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="60%" stop-color="#140033"/>
      <stop offset="100%" stop-color="#2a0050"/>
    </linearGradient>
    <linearGradient id="rain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff66" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff66" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ff66" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff0aa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff0aa" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="600" height="320" fill="url(#sky)"/>

  <!-- moon glow + moon -->
  <circle cx="500" cy="60" r="40" fill="url(#moonGlow)"/>
  <circle cx="500" cy="60" r="14" fill="#e0e0ff"/>
  <circle cx="504" cy="58" r="12" fill="#140033"/>

  <!-- stars (twinkle) -->
  <g fill="#e0e0ff">
    <circle cx="40"  cy="30" r="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="50" r="1.0"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="22" r="0.7"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="5.2s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="44" r="1.1"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="80"  cy="80" r="0.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="70" r="0.9"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="100" r="0.7"><animate attributeName="opacity" values="0.4;1;0.4" dur="5.0s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="40" r="0.8"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- distant skyline silhouette -->
  <g fill="#0a0014" opacity="0.85">
    <rect x="0"   y="160" width="40" height="80"/>
    <rect x="40"  y="140" width="30" height="100"/>
    <rect x="70"  y="170" width="20" height="70"/>
    <rect x="90"  y="130" width="50" height="110"/>
    <rect x="140" y="155" width="35" height="85"/>
    <rect x="175" y="120" width="25" height="120"/>
    <rect x="200" y="160" width="40" height="80"/>
    <rect x="240" y="140" width="40" height="100"/>
    <rect x="280" y="155" width="20" height="85"/>
    <rect x="300" y="125" width="35" height="115"/>
    <rect x="335" y="150" width="25" height="90"/>
    <rect x="360" y="130" width="50" height="110"/>
    <rect x="410" y="160" width="30" height="80"/>
    <rect x="440" y="140" width="40" height="100"/>
    <rect x="480" y="155" width="20" height="85"/>
    <rect x="500" y="135" width="40" height="105"/>
    <rect x="540" y="150" width="60" height="90"/>
  </g>

  <!-- distant skyline windows (dim) -->
  <g fill="#ffcc00" opacity="0.6">
    <rect x="46"  y="148" width="2" height="3"/><rect x="52" y="155" width="2" height="3"/>
    <rect x="100" y="140" width="2" height="3"/><rect x="108" y="148" width="2" height="3"/><rect x="118" y="158" width="2" height="3"/>
    <rect x="184" y="130" width="2" height="3"/><rect x="190" y="140" width="2" height="3"/><rect x="184" y="150" width="2" height="3"/>
    <rect x="250" y="150" width="2" height="3"/><rect x="262" y="160" width="2" height="3"/>
    <rect x="312" y="135" width="2" height="3"/><rect x="320" y="145" width="2" height="3"/><rect x="312" y="155" width="2" height="3"/>
    <rect x="370" y="142" width="2" height="3"/><rect x="380" y="152" width="2" height="3"/><rect x="394" y="160" width="2" height="3"/>
    <rect x="450" y="148" width="2" height="3"/><rect x="464" y="158" width="2" height="3"/>
    <rect x="510" y="145" width="2" height="3"/><rect x="525" y="155" width="2" height="3"/>
    <rect x="552" y="160" width="2" height="3"/><rect x="568" y="170" width="2" height="3"/>
  </g>

  <!-- foreground tower (left) -->
  <g>
    <polygon points="80,100 130,90 130,260 80,250" fill="#1f1f3a"/>
    <polygon points="130,90 180,100 180,260 130,260" fill="#3a2d4d"/>
    <!-- windows -->
    <g fill="#00ddff" filter="url(#neon)">
      <rect x="92"  y="120" width="6" height="8"/>
      <rect x="105" y="120" width="6" height="8"/>
      <rect x="92"  y="140" width="6" height="8"/>
      <rect x="118" y="140" width="6" height="8"/>
      <rect x="105" y="160" width="6" height="8"/>
      <rect x="92"  y="180" width="6" height="8"/>
      <rect x="105" y="200" width="6" height="8"/>
      <rect x="118" y="220" width="6" height="8"/>
    </g>
    <g fill="#ffcc00" filter="url(#neon)">
      <rect x="118" y="120" width="6" height="8"/>
      <rect x="105" y="140" width="6" height="8"/>
      <rect x="118" y="160" width="6" height="8"/>
      <rect x="105" y="180" width="6" height="8"/>
      <rect x="92"  y="200" width="6" height="8"/>
    </g>
    <g fill="#ff1a8c" filter="url(#neon)">
      <rect x="140" y="120" width="6" height="8"/>
      <rect x="155" y="135" width="6" height="8"/>
      <rect x="170" y="155" width="6" height="8"/>
      <rect x="140" y="175" width="6" height="8"/>
      <rect x="170" y="195" width="6" height="8"/>
    </g>
  </g>

  <!-- mega tower (centre) -->
  <g>
    <polygon points="220,60 280,50 280,260 220,260" fill="#1f1f3a"/>
    <polygon points="280,50 340,60 340,260 280,260" fill="#3a2d4d"/>
    <!-- antenna -->
    <line x1="280" y1="50" x2="280" y2="20" stroke="#5c4d6e" stroke-width="2"/>
    <circle cx="280" cy="20" r="3" fill="#ff1a8c" filter="url(#neon)">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <!-- windows -->
    <g fill="#00ddff" filter="url(#neon)">
      <rect x="232" y="80"  width="6" height="8"/>
      <rect x="248" y="80"  width="6" height="8"/>
      <rect x="264" y="80"  width="6" height="8"/>
      <rect x="232" y="100" width="6" height="8"/>
      <rect x="264" y="100" width="6" height="8"/>
      <rect x="248" y="120" width="6" height="8"/>
      <rect x="232" y="140" width="6" height="8"/>
      <rect x="264" y="140" width="6" height="8"/>
      <rect x="248" y="160" width="6" height="8"/>
      <rect x="232" y="180" width="6" height="8"/>
      <rect x="264" y="180" width="6" height="8"/>
    </g>
    <g fill="#ffcc00" filter="url(#neon)">
      <rect x="248" y="100" width="6" height="8"/>
      <rect x="232" y="120" width="6" height="8"/>
      <rect x="248" y="140" width="6" height="8"/>
      <rect x="264" y="160" width="6" height="8"/>
      <rect x="248" y="200" width="6" height="8"/>
    </g>
    <g fill="#ff66cc" filter="url(#neon)">
      <rect x="290" y="80"  width="6" height="8"/>
      <rect x="306" y="100" width="6" height="8"/>
      <rect x="322" y="120" width="6" height="8"/>
      <rect x="290" y="140" width="6" height="8"/>
      <rect x="322" y="160" width="6" height="8"/>
      <rect x="306" y="180" width="6" height="8"/>
      <rect x="290" y="200" width="6" height="8"/>
    </g>
    <!-- holographic sign -->
    <text x="280" y="74" text-anchor="middle" font-family="monospace" font-size="9" fill="#00ddff" filter="url(#neon)" font-weight="bold">MEGA</text>
  </g>

  <!-- right tower -->
  <g>
    <polygon points="380,140 420,130 420,260 380,260" fill="#1f1f3a"/>
    <polygon points="420,130 460,140 460,260 420,260" fill="#3a2d4d"/>
    <g fill="#00ff66" filter="url(#neon)">
      <rect x="388" y="150" width="5" height="6"/>
      <rect x="400" y="160" width="5" height="6"/>
      <rect x="388" y="175" width="5" height="6"/>
      <rect x="412" y="175" width="5" height="6"/>
      <rect x="400" y="190" width="5" height="6"/>
      <rect x="388" y="210" width="5" height="6"/>
    </g>
    <g fill="#00ddff" filter="url(#neon)">
      <rect x="430" y="150" width="5" height="6"/>
      <rect x="446" y="165" width="5" height="6"/>
      <rect x="430" y="180" width="5" height="6"/>
      <rect x="446" y="195" width="5" height="6"/>
      <rect x="430" y="215" width="5" height="6"/>
    </g>
  </g>

  <!-- shorter buildings (right) -->
  <g>
    <polygon points="470,200 510,195 510,260 470,260" fill="#1f1f3a"/>
    <polygon points="510,195 550,200 550,260 510,260" fill="#3a2d4d"/>
    <g fill="#ffcc00" filter="url(#neon)">
      <rect x="478" y="210" width="4" height="6"/>
      <rect x="488" y="220" width="4" height="6"/>
      <rect x="498" y="210" width="4" height="6"/>
      <rect x="520" y="215" width="4" height="6"/>
      <rect x="535" y="225" width="4" height="6"/>
    </g>
  </g>

  <!-- ground line -->
  <line x1="0" y1="260" x2="600" y2="260" stroke="#ff1a8c" stroke-width="0.8" opacity="0.6"/>

  <!-- street -->
  <rect x="0" y="262" width="600" height="58" fill="#0a0014"/>
  <g stroke="#5c4d6e" stroke-width="1" stroke-dasharray="8 8">
    <line x1="0" y1="290" x2="600" y2="290"/>
  </g>

  <!-- traffic dots -->
  <g fill="#ffcc00" filter="url(#neon)">
    <rect x="0" y="285" width="4" height="3">
      <animate attributeName="x" from="-10" to="610" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="295" width="4" height="3">
      <animate attributeName="x" from="-200" to="610" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="285" width="3" height="2">
      <animate attributeName="x" from="-400" to="610" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- acid rain streaks -->
  <g opacity="0.45">
    <line x1="60"  y1="0" x2="40"  y2="320" stroke="url(#rain)" stroke-width="1"><animate attributeName="x1" from="80"  to="60"  dur="1.2s" repeatCount="indefinite"/><animate attributeName="x2" from="60"  to="40"  dur="1.2s" repeatCount="indefinite"/></line>
    <line x1="180" y1="0" x2="160" y2="320" stroke="url(#rain)" stroke-width="1"><animate attributeName="x1" from="200" to="180" dur="1.0s" repeatCount="indefinite"/><animate attributeName="x2" from="180" to="160" dur="1.0s" repeatCount="indefinite"/></line>
    <line x1="290" y1="0" x2="270" y2="320" stroke="url(#rain)" stroke-width="1"><animate attributeName="x1" from="310" to="290" dur="1.4s" repeatCount="indefinite"/><animate attributeName="x2" from="290" to="270" dur="1.4s" repeatCount="indefinite"/></line>
    <line x1="400" y1="0" x2="380" y2="320" stroke="url(#rain)" stroke-width="1"><animate attributeName="x1" from="420" to="400" dur="1.1s" repeatCount="indefinite"/><animate attributeName="x2" from="400" to="380" dur="1.1s" repeatCount="indefinite"/></line>
    <line x1="510" y1="0" x2="490" y2="320" stroke="url(#rain)" stroke-width="1"><animate attributeName="x1" from="530" to="510" dur="1.3s" repeatCount="indefinite"/><animate attributeName="x2" from="510" to="490" dur="1.3s" repeatCount="indefinite"/></line>
  </g>
</svg>
